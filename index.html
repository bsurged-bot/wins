<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wins" />
  <title>Wins Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #22223a;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
      --text: #f0eef8; --muted: #8884a8; --accent: #7c6ef5;
      --accent-dim: rgba(124,110,245,0.15); --green: #4ade80;
      --green-dim: rgba(74,222,128,0.12); --red: #f87171;
      --yellow: #fbbf24; --yellow-dim: rgba(251,191,36,0.12);
      --radius: 14px; --radius-sm: 8px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100dvh;
      display: flex; flex-direction: column; padding: 0 0 6rem; }

    /* Topbar */
    .topbar { position: sticky; top: 0; z-index: 10; background: var(--bg);
      padding: 1rem 1.25rem 0.75rem; border-bottom: 0.5px solid var(--border); }
    .topbar-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .app-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .app-title span { color: var(--accent); }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .today-badge { font-size: 12px; font-weight: 600; background: var(--accent-dim);
      color: var(--accent); padding: 4px 10px; border-radius: 20px;
      border: 0.5px solid rgba(124,110,245,0.3); }
    .icon-btn { background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm); padding: 5px 10px; cursor: pointer;
      color: var(--muted); font-size: 14px; display: flex; align-items: center; gap: 4px; }
    .icon-btn:active { opacity: 0.7; }
    .streak { font-size: 12px; color: var(--muted); }

    /* Stats */
    .stats { display: flex; gap: 8px; padding: 1rem 1.25rem 0.5rem; }
    .stat-card { flex: 1; background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 2px; }
    .stat-num { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

    /* Yesterday summary */
    .summary-card { margin: 0 1.25rem 1rem; background: var(--surface);
      border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 12px 14px; }
    .summary-title { font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .summary-text { font-size: 14px; color: var(--text); line-height: 1.5; }
    .summary-highlights { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .highlight-pill { font-size: 12px; background: var(--yellow-dim); color: var(--yellow);
      border: 0.5px solid rgba(251,191,36,0.2); border-radius: 20px; padding: 3px 9px; }
    .followup-pill { font-size: 12px; background: rgba(248,113,113,0.1); color: var(--red);
      border: 0.5px solid rgba(248,113,113,0.2); border-radius: 20px; padding: 3px 9px; }

    /* List */
    .list-area { flex: 1; padding: 0 1.25rem; }
    .day-group { margin-bottom: 1.5rem; }
    .day-header { font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em; padding: 0.75rem 0 0.5rem;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 0.5px solid var(--border); margin-bottom: 4px; }
    .day-count { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 12px; }
    .win-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
      border-bottom: 0.5px solid var(--border); user-select: none; -webkit-user-select: none; }
    .win-item:last-child { border-bottom: none; }
    .win-item.followup { border-left: 2px solid var(--red); padding-left: 8px; margin-left: -10px; }
    .win-item.starred { border-left: 2px solid var(--yellow); padding-left: 8px; margin-left: -10px; }

    .check-icon { width: 22px; height: 22px; background: var(--green-dim);
      border: 0.5px solid rgba(74,222,128,0.25); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .check-icon svg { width: 12px; height: 12px; stroke: var(--green); stroke-width: 2.5;
      fill: none; stroke-linecap: round; stroke-linejoin: round; }

    .win-body { flex: 1; min-width: 0; }
    .win-text { font-size: 15px; color: var(--text); line-height: 1.4; }
    .win-text .hashtag { color: var(--red); font-weight: 600; }
    .win-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
    .cat-tag { font-size: 11px; background: var(--accent-dim); color: var(--accent);
      border-radius: 20px; padding: 2px 7px; border: 0.5px solid rgba(124,110,245,0.2); }
    .followup-tag { font-size: 11px; background: rgba(248,113,113,0.1); color: var(--red);
      border-radius: 20px; padding: 2px 7px; border: 0.5px solid rgba(248,113,113,0.2); }

    .win-meta { font-size: 12px; color: var(--muted); display: flex;
      align-items: center; gap: 6px; flex-shrink: 0; margin-top: 1px; }
    .reaction { font-size: 15px; line-height: 1; }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 2px; opacity: 0; transition: opacity 0.1s; line-height: 1; }
    .win-item:hover .del-btn, .win-item:focus-within .del-btn { opacity: 1; }
    .del-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2;
      fill: none; stroke-linecap: round; }
    .del-btn:active { color: var(--red); }
    .classifying { opacity: 0.5; font-size: 11px; color: var(--muted); font-style: italic; }

    /* Input */
    .input-area { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; background: var(--bg);
      border-top: 0.5px solid var(--border); padding: 0.75rem 1rem 1.25rem; z-index: 10; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .win-input { flex: 1; background: var(--surface); border: 0.5px solid var(--border2);
      border-radius: var(--radius); padding: 12px 16px; font-size: 15px; color: var(--text);
      font-family: inherit; outline: none; transition: border-color 0.15s; }
    .win-input:focus { border-color: var(--accent); }
    .win-input::placeholder { color: var(--muted); }
    .add-btn { background: var(--accent); border: none; border-radius: var(--radius);
      width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
    .add-btn:active { transform: scale(0.94); opacity: 0.85; }
    .add-btn svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 5px; padding-left: 2px; }

    /* Reaction popup */
    .reaction-popup { position: fixed; z-index: 100; background: var(--surface2);
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 10px 14px; display: flex; gap: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transform: translateY(-8px); }
    .reaction-popup button { background: none; border: none; font-size: 24px;
      cursor: pointer; padding: 4px; border-radius: 8px; transition: transform 0.1s; }
    .reaction-popup button:active { transform: scale(1.3); }

    /* Share modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
    .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 480px; padding: 1.25rem; max-height: 80vh;
      display: flex; flex-direction: column; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .modal-options { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .modal-opt { background: var(--surface2); border: 0.5px solid var(--border2);
      border-radius: var(--radius-sm); padding: 8px 14px; cursor: pointer;
      font-size: 13px; color: var(--text); }
    .modal-opt.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .modal-preview { flex: 1; overflow-y: auto; background: var(--bg);
      border-radius: var(--radius-sm); padding: 12px; font-size: 13px;
      color: var(--text); line-height: 1.6; white-space: pre-wrap;
      font-family: monospace; margin-bottom: 1rem; min-height: 120px; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-btn { flex: 1; padding: 12px; border-radius: var(--radius);
      border: none; cursor: pointer; font-size: 15px; font-weight: 600; }
    .modal-btn.primary { background: var(--accent); color: #fff; }
    .modal-btn.secondary { background: var(--surface2); color: var(--text); }

    /* Empty */
    .empty { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 1rem; opacity: 0.3; }
    .empty p { font-size: 15px; line-height: 1.6; }
  </style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-title">wins<span>.</span></div>
      <div class="topbar-actions">
        <div class="today-badge" id="today-badge">0 today</div>
        <button class="icon-btn" id="share-btn">Share</button>
      </div>
    </div>
    <div class="streak" id="streak-line">Start logging your accomplishments</div>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-num" id="stat-today">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-num" id="stat-week">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">All time</div>
      <div class="stat-num" id="stat-all">0</div>
    </div>
  </div>

  <div id="summary-area"></div>
  <div class="list-area" id="list-area"></div>

  <div class="input-area">
    <div class="input-row">
      <input class="win-input" id="win-input" type="text"
        placeholder="What did you just finish?" maxlength="200" autocomplete="off" />
      <button class="add-btn" id="add-btn" aria-label="Log win">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="input-hint">Add # for follow-up items &nbsp;·&nbsp; Long press to react ⭐ 😊</div>
  </div>
</div>

<script>
const STORE = 'wins_pwa_v2';
const API_KEY_STORE = 'wins_api_key';

// ── Storage ──────────────────────────────────────────────────────────────────
function load() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; }
}
function save(wins) { localStorage.setItem(STORE, JSON.stringify(wins)); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(ts) { return new Date(ts).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }
function dayKey(ts) { return new Date(ts).toDateString(); }
function dayLabel(ts) {
  const d = new Date(ts), t = new Date(), y = new Date();
  y.setDate(t.getDate() - 1);
  if (d.toDateString() === t.toDateString()) return 'Today';
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
}
function weekStart() {
  const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() - d.getDay()); return d.getTime();
}
function hasFollowup(text) { return /#/.test(text); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function highlightHashtags(text) {
  return escHtml(text).replace(/#(\S+)/g, '<span class="hashtag">#$1</span>');
}

// ── AI Classification ─────────────────────────────────────────────────────────
const CATEGORIES = ['health','work','creative','home','learning','social','finance','personal'];

async function classify(text) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 60,
        messages: [{
          role: 'user',
          content: `Classify this accomplishment into exactly one of these categories: ${CATEGORIES.join(', ')}.
Respond with ONLY the category word, nothing else.
Accomplishment: "${text}"`
        }]
      })
    });
    const data = await res.json();
    const cat = data.content?.[0]?.text?.trim().toLowerCase();
    return CATEGORIES.includes(cat) ? cat : 'personal';
  } catch { return 'personal'; }
}

// ── Yesterday Summary ─────────────────────────────────────────────────────────
async function generateSummary(yesterdayWins) {
  if (!yesterdayWins.length) return null;
  const highlights = yesterdayWins.filter(w => w.reaction);
  const followups = yesterdayWins.filter(w => hasFollowup(w.text));
  const lines = yesterdayWins.map(w => w.text).join('\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 120,
        messages: [{
          role: 'user',
          content: `Write a ONE sentence encouraging summary of yesterday's accomplishments. Be warm and specific. No fluff.
Accomplishments:\n${lines}`
        }]
      })
    });
    const data = await res.json();
    return { summary: data.content?.[0]?.text?.trim(), highlights, followups };
  } catch {
    return { summary: `You got ${yesterdayWins.length} things done yesterday.`, highlights, followups };
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
let wins = load();
let summaryCache = null;
let activePopup = null;

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const today = new Date().toDateString();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yKey = yesterday.toDateString();

  const todayWins = wins.filter(w => dayKey(w.ts) === today);
  const weekWins = wins.filter(w => w.ts >= weekStart());

  document.getElementById('today-badge').textContent = todayWins.length + ' today';
  document.getElementById('stat-today').textContent = todayWins.length;
  document.getElementById('stat-week').textContent = weekWins.length;
  document.getElementById('stat-all').textContent = wins.length;
  document.getElementById('stats').style.display = wins.length ? 'flex' : 'none';

  const streakLine = document.getElementById('streak-line');
  streakLine.textContent = wins.length === 0
    ? 'Start logging your accomplishments'
    : todayWins.length === 0
      ? 'Nothing logged yet today — what have you done?'
      : `${todayWins.length} thing${todayWins.length !== 1 ? 's' : ''} done today. Keep going.`;

  // Yesterday summary
  const summaryArea = document.getElementById('summary-area');
  const yWins = wins.filter(w => dayKey(w.ts) === yKey);
  if (yWins.length && summaryCache) {
    const { summary, highlights, followups } = summaryCache;
    summaryArea.innerHTML = `
      <div class="summary-card">
        <div class="summary-title">Yesterday</div>
        <div class="summary-text">${escHtml(summary)}</div>
        ${highlights.length || followups.length ? `
          <div class="summary-highlights">
            ${highlights.map(w => `<span class="highlight-pill">${w.reaction} ${escHtml(w.text.slice(0,30))}${w.text.length > 30 ? '…' : ''}</span>`).join('')}
            ${followups.map(w => `<span class="followup-pill">↩ ${escHtml(w.text.replace(/#\S+/g,'').trim().slice(0,25))}…</span>`).join('')}
          </div>` : ''}
      </div>`;
  } else if (yWins.length && !summaryCache) {
    summaryArea.innerHTML = `<div class="summary-card"><div class="summary-title">Yesterday</div><div class="summary-text classifying">Generating summary…</div></div>`;
    generateSummary(yWins).then(s => { summaryCache = s; render(); });
  } else {
    summaryArea.innerHTML = '';
  }

  // List
  const area = document.getElementById('list-area');
  if (wins.length === 0) {
    area.innerHTML = '<div class="empty"><div class="empty-icon">🏁</div><p>Tap + to log your first win.<br>Every small thing counts.</p></div>';
    return;
  }

  const groups = {};
  [...wins].reverse().forEach(w => {
    const k = dayKey(w.ts);
    if (!groups[k]) groups[k] = { label: dayLabel(w.ts), items: [] };
    groups[k].items.push(w);
  });

  area.innerHTML = Object.values(groups).map(g => `
    <div class="day-group">
      <div class="day-header">${g.label}<span class="day-count">${g.items.length} item${g.items.length !== 1 ? 's' : ''}</span></div>
      ${g.items.map(w => `
        <div class="win-item ${hasFollowup(w.text) ? 'followup' : ''} ${w.reaction ? 'starred' : ''}"
             data-id="${w.id}"
             oncontextmenu="showReactionPopup(event,'${w.id}')"
             ontouchstart="startLongPress(event,'${w.id}')"
             ontouchend="cancelLongPress()"
             ontouchmove="cancelLongPress()">
          <div class="check-icon">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="win-body">
            <div class="win-text">${highlightHashtags(w.text)}</div>
            <div class="win-tags">
              ${w.category ? `<span class="cat-tag">${w.category}</span>` : '<span class="cat-tag classifying" style="opacity:0.4">…</span>'}
              ${hasFollowup(w.text) ? '<span class="followup-tag">↩ follow-up</span>' : ''}
            </div>
          </div>
          <div class="win-meta">
            ${w.reaction ? `<span class="reaction">${w.reaction}</span>` : ''}
            <span>${fmt(w.ts)}</span>
            <button class="del-btn" onclick="deleteWin('${w.id}')" aria-label="Delete">
              <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ── Add win ────────────────────────────────────────────────────────────────────
async function addWin() {
  const input = document.getElementById('win-input');
  const text = input.value.trim();
  if (!text) return;
  const win = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), text, ts: Date.now(), category: null, reaction: null };
  wins.push(win);
  save(wins);
  render();
  input.value = '';
  input.focus();
  // Classify in background
  const cat = await classify(text);
  const idx = wins.findIndex(w => w.id === win.id);
  if (idx !== -1) { wins[idx].category = cat; save(wins); render(); }
}

window.deleteWin = function(id) {
  wins = wins.filter(w => w.id !== id);
  save(wins);
  render();
};

// ── Long press / reaction ─────────────────────────────────────────────────────
let longPressTimer = null;

window.startLongPress = function(e, id) {
  longPressTimer = setTimeout(() => showReactionPopup(e, id), 500);
};
window.cancelLongPress = function() { clearTimeout(longPressTimer); };

window.showReactionPopup = function(e, id) {
  e.preventDefault();
  closePopup();
  const popup = document.createElement('div');
  popup.className = 'reaction-popup';
  popup.id = 'reaction-popup';
  const reactions = ['⭐','😊','💪','🔥','✅'];
  reactions.forEach(r => {
    const btn = document.createElement('button');
    btn.textContent = r;
    btn.onclick = () => { setReaction(id, r); closePopup(); };
    popup.appendChild(btn);
  });
  // Position near touch
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  popup.style.left = Math.min(x - 80, window.innerWidth - 200) + 'px';
  popup.style.top = (y - 70) + 'px';
  document.body.appendChild(popup);
  activePopup = popup;
  setTimeout(() => document.addEventListener('click', closePopup, { once: true }), 10);
};

function closePopup() {
  if (activePopup) { activePopup.remove(); activePopup = null; }
}

function setReaction(id, reaction) {
  const w = wins.find(w => w.id === id);
  if (w) { w.reaction = w.reaction === reaction ? null : reaction; save(wins); render(); }
}

// ── Share / Export ────────────────────────────────────────────────────────────
function filterByRange(range) {
  const today = new Date().toDateString();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  if (range === 'today') return wins.filter(w => dayKey(w.ts) === today);
  if (range === 'yesterday') return wins.filter(w => dayKey(w.ts) === yesterday.toDateString());
  if (range === 'week') return wins.filter(w => w.ts >= weekStart());
  return wins;
}

function buildExportText(range) {
  const filtered = filterByRange(range);
  if (!filtered.length) return '(nothing logged in this range)';
  const groups = {};
  [...filtered].reverse().forEach(w => {
    const k = dayKey(w.ts);
    if (!groups[k]) groups[k] = { label: dayLabel(w.ts), items: [] };
    groups[k].items.push(w);
  });
  return Object.values(groups).map(g => {
    const lines = g.items.map(w => {
      const reaction = w.reaction ? w.reaction + ' ' : '';
      const followup = hasFollowup(w.text) ? ' [follow-up]' : '';
      const cat = w.category ? ` #${w.category}` : '';
      return `• ${reaction}${w.text}${followup}${cat} (${fmt(w.ts)})`;
    }).join('\n');
    return `${g.label}\n${lines}`;
  }).join('\n\n') + '\n\n— from wins.';
}

function buildExportCSV(range) {
  const filtered = filterByRange(range);
  if (!filtered.length) return 'date,time,text,category,reaction,followup\n';
  const rows = [['date','time','text','category','reaction','followup']];
  [...filtered].reverse().forEach(w => {
    const d = new Date(w.ts);
    rows.push([
      d.toLocaleDateString(),
      fmt(w.ts),
      `"${w.text.replace(/"/g,'""')}"`,
      w.category || '',
      w.reaction || '',
      hasFollowup(w.text) ? 'yes' : 'no'
    ]);
  });
  return rows.map(r => r.join(',')).join('\n');
}

function downloadFile(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function dateStamp() {
  return new Date().toISOString().slice(0,10);
}

let currentRange = 'today';
function openShareModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'share-modal';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-title">Export your wins</div>
      <div class="modal-options">
        ${['today','yesterday','week','all'].map(r =>
          `<div class="modal-opt ${r === currentRange ? 'active' : ''}" data-range="${r}">${r === 'all' ? 'All time' : r.charAt(0).toUpperCase()+r.slice(1)}</div>`
        ).join('')}
      </div>
      <div class="modal-preview" id="share-preview">${buildExportText(currentRange)}</div>
      <div class="modal-actions" style="flex-wrap:wrap;gap:8px">
        <button class="modal-btn secondary" onclick="closeShareModal()">Cancel</button>
        <button class="modal-btn secondary" onclick="doDownloadTxt()" style="flex:none;padding:12px 16px">⬇ .txt</button>
        <button class="modal-btn secondary" onclick="doDownloadCSV()" style="flex:none;padding:12px 16px">⬇ .csv</button>
        <button class="modal-btn primary" onclick="doShare()">Share</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  overlay.querySelectorAll('.modal-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      currentRange = opt.dataset.range;
      overlay.querySelectorAll('.modal-opt').forEach(o => o.classList.remove('active'));
      opt.classList.add('active');
      document.getElementById('share-preview').textContent = buildExportText(currentRange);
    });
  });
}

window.closeShareModal = function() {
  const m = document.getElementById('share-modal');
  if (m) m.remove();
};

window.doDownloadTxt = function() {
  downloadFile(buildExportText(currentRange), `wins-${dateStamp()}.txt`, 'text/plain');
  closeShareModal();
};

window.doDownloadCSV = function() {
  downloadFile(buildExportCSV(currentRange), `wins-${dateStamp()}.csv`, 'text/csv');
  closeShareModal();
};

window.doShare = async function() {
  const text = buildExportText(currentRange);
  if (navigator.share) {
    try { await navigator.share({ title: 'My Wins', text }); } catch {}
  } else {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  }
  closeShareModal();
};

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', addWin);
document.getElementById('win-input').addEventListener('keydown', e => { if (e.key === 'Enter') addWin(); });
document.getElementById('share-btn').addEventListener('click', openShareModal);

render();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
